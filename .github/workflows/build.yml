name: Build PSP Game

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build PSP game
      run: |
        docker run --rm -v ${{ github.workspace }}:/build -w /build pspdev/pspdev:latest sh -c "
          make clean || true
          make
          
          echo '=== Rebuilding PARAM.SFO with CATEGORY ==='
          rm -f PARAM.SFO EBOOT.PBP
          mksfoex -d MEMSIZE=1 -s CATEGORY=UG -s DISC_ID=UCJS10041 -s DISC_VERSION=1.00 -d PARENTAL_LEVEL=1 'Hello PSP Game' PARAM.SFO
          
          touch /tmp/empty.png
          touch /tmp/empty.pmf
          touch /tmp/empty.at3
          touch /tmp/empty.psar
          
          pack-pbp EBOOT.PBP PARAM.SFO /tmp/empty.png /tmp/empty.pmf /tmp/empty.png /tmp/empty.png /tmp/empty.at3 hello_psp.elf /tmp/empty.psar
          
          echo '=== Final check ==='
          strings PARAM.SFO
          ls -la EBOOT.PBP hello_psp.elf
        "

    - name: Create ISO
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq genisoimage
        mkdir -p iso_root/PSP_GAME
        cp EBOOT.PBP iso_root/PSP_GAME/
        genisoimage -A "HELLO PSP" -V "HELLO_PSP" -r -J -o game.iso iso_root/
        ls -la game.iso

    - name: Upload EBOOT.PBP
      uses: actions/upload-artifact@v4
      with:
        name: psp-game-eboot
        path: EBOOT.PBP
        if-no-files-found: error

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: psp-game-iso
        path: game.iso
        if-no-files-found: warn

name: Build PSP Game

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build PSP game
      run: |
        docker run --rm -v ${{ github.workspace }}:/build -w /build pspdev/pspdev:latest sh -c "
          make clean || true
          make
          psp-strip hello_psp.elf -o hello_psp_strip.elf
        "

    - name: Create EBOOT.PBP
      run: |
        rm -f EBOOT.PBP PARAM.SFO
        python3 << 'PYEOF'
        import struct, os

        def create_sfo(title, category="UG", disc_id="UCJS10041", disc_ver="1.00", parental=1):
            keys = b""
            vals = b""
            items = []

            fields = [
                ("BOOTABLE", b"\x01\x00\x00\x00", 0x04),
                ("CATEGORY", category.encode("ascii") + b"\x00", 0x02),
                ("DISC_ID", disc_id.encode("ascii") + b"\x00", 0x02),
                ("DISC_VERSION", disc_ver.encode("ascii") + b"\x00", 0x02),
                ("MEMSIZE", b"\x01\x00\x00\x00", 0x04),
                ("PARENTAL_LEVEL", struct.pack("<I", parental), 0x04),
                ("PSP_SYSTEM_VER", b"\x01\x00\x00\x00", 0x04),
                ("REGION", b"\x00\x00\x00\x00", 0x04),
                ("TITLE", title.encode("utf-8") + b"\x00", 0x02),
            ]

            for name, data, flag in fields:
                items.append((name, data, flag))

            # Sort by name for SFO format
            items.sort(key=lambda x: x[0])

            key_table = b""
            val_table = b""
            key_offsets = []
            val_offsets = []

            for name, data, flag in items:
                key_offsets.append(len(key_table))
                key_table += name.encode("ascii") + b"\x00"

            for name, data, flag in items:
                val_offsets.append(len(val_table))
                val_table += data

            # SFO header
            header_size = 20
            key_table_offset = header_size
            val_table_offset = key_table_offset + len(key_table)
            n_items = len(items)

            sfo = struct.pack("<4sIIII", b"\x00PSF", 0x0101, key_table_offset, val_table_offset, n_items)

            # Key entries (12 bytes each)
            for i, (name, data, flag) in enumerate(items):
                sfo += struct.pack("<HBB", key_offsets[i], 0x04, 0x04)

            # Value entries (16 bytes each)
            for i, (name, data, flag) in enumerate(items):
                sfo += struct.pack("<HHIH", val_offsets[i], flag, len(data), 0x0000)

            # Pad to alignment
            while len(sfo) % 4:
                sfo += b"\x00"

            sfo += key_table
            while len(sfo) % 4:
                sfo += b"\x00"

            sfo += val_table
            while len(sfo) % 4:
                sfo += b"\x00"

            return sfo

        # Read ELF
        with open("hello_psp_strip.elf", "rb") as f:
            elf_data = f.read()

        # Create PARAM.SFO
        sfo_data = create_sfo("Hello PSP Game")

        # Create PBP
        pbp_header = b"\x00PBP"  # magic
        pbp_header += struct.pack("<I", 0x00010000)  # version

        # Offsets: PARAM.SFO, ICON0, ICON1, PIC0, PIC1, SND0, DATA.PSP, DATA.PSAR
        # Header is 8 + 9*4 = 44 bytes
        # We put PARAM.SFO right after header, ELF after that
        header_size = 8 + 9 * 4  # = 44
        sfo_offset = header_size
        elf_offset = sfo_offset + len(sfo_data)
        # All other offsets point to elf_offset (empty)
        offsets = [sfo_offset, elf_offset, elf_offset, elf_offset, elf_offset, elf_offset, elf_offset, elf_offset]

        pbp = pbp_header
        for o in offsets:
            pbp += struct.pack("<I", o)

        pbp += sfo_data
        pbp += elf_data

        with open("EBOOT.PBP", "wb") as f:
            f.write(pbp)

        print(f"Created EBOOT.PBP: {len(pbp)} bytes")
        print(f"  PARAM.SFO: {len(sfo_data)} bytes at offset {sfo_offset}")
        print(f"  ELF: {len(elf_data)} bytes at offset {elf_offset}")
        PYEOF

    - name: Create ISO
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq genisoimage
        mkdir -p iso_root/PSP_GAME
        cp EBOOT.PBP iso_root/PSP_GAME/
        genisoimage -A "HELLO PSP" -V "HELLO_PSP" -r -J -o game.iso iso_root/

    - name: Upload EBOOT.PBP
      uses: actions/upload-artifact@v4
      with:
        name: psp-game-eboot
        path: EBOOT.PBP
        if-no-files-found: error

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: psp-game-iso
        path: game.iso
        if-no-files-found: warn

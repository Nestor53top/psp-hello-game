name: Build PSP Game

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build PSP game
      run: |
        docker run --rm -v ${{ github.workspace }}:/build -w /build pspdev/pspdev:latest sh -c "
          echo '=== Checking mksfoex ==='
          which mksfoex || echo 'mksfoex not found'
          mksfoex --help 2>&1 || true
          
          echo '=== Testing mksfoex ==='
          mksfoex 'Test Game' /tmp/test.sfo
          hexdump -C /tmp/test.sfo | head -10
          
          echo '=== Building ==='
          make clean || true
          make
          
          echo '=== Checking PARAM.SFO ==='
          if [ -f PARAM.SFO ]; then
            hexdump -C PARAM.SFO | head -10
            strings PARAM.SFO
          fi
          
          ls -la EBOOT.PBP hello_psp.elf
        "

    - name: Create ISO
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq genisoimage
        mkdir -p iso_root/PSP_GAME
        cp EBOOT.PBP iso_root/PSP_GAME/
        genisoimage -A "HELLO PSP" -V "HELLO_PSP" -r -J -o game.iso iso_root/
        ls -la game.iso

    - name: Upload EBOOT.PBP
      uses: actions/upload-artifact@v4
      with:
        name: psp-game-eboot
        path: EBOOT.PBP
        if-no-files-found: error

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: psp-game-iso
        path: game.iso
        if-no-files-found: warn

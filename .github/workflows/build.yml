name: Build PSP Game

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install PSPSDK
      run: |
        wget -q https://github.com/pspdev/pspdev/releases/download/v20260701/pspdev-ubuntu-latest-x86_64.tar.gz -O /tmp/pspdev.tar.gz
        sudo tar -xzf /tmp/pspdev.tar.gz -C /
        echo "/usr/local/pspdev/psp/bin" >> $GITHUB_PATH
        echo "/usr/local/pspdev/bin" >> $GITHUB_PATH
        export PSPDEV=/usr/local/pspdev
        export PATH=$PSPDEV/bin:$PATH
        psp-config --pspsdk-path

    - name: Build PSP game
      run: |
        export PSPDEV=/usr/local/pspdev
        export PATH=$PSPDEV/psp/bin:$PSPDEV/bin:$PATH
        which psp-gcc
        make clean || true
        make

    - name: List build artifacts
      run: ls -la *.pbp *.elf 2>/dev/null || echo "Checking files..."

    - name: Create ISO
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq genisoimage
        
        mkdir -p iso_root/PSP_GAME
        cp EBOOT.PBP iso_root/PSP_GAME/
        
        # Create PARAM.SFO
        export PSPDEV=/usr/local/pspdev
        export PATH=$PSPDEV/bin:$PATH
        if command -v mksfo &> /dev/null; then
          mksfo "HELLO PSP GAME" iso_root/PSP_GAME/PARAM.SFO || true
        fi
        
        genisoimage -A "HELLO PSP" -V "HELLO_PSP" -r -J -o game.iso iso_root/
        ls -la game.iso

    - name: Upload EBOOT.PBP
      uses: actions/upload-artifact@v4
      with:
        name: psp-game-eboot
        path: EBOOT.PBP
        if-no-files-found: error

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: psp-game-iso
        path: game.iso
        if-no-files-found: warn

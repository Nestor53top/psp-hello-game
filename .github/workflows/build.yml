name: Build PSP Game

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build PSP game
      run: |
        docker run --rm -v ${{ github.workspace }}:/build -w /build pspdev/pspdev:latest sh -c "
          make clean || true
          make
          psp-strip hello_psp.elf -o hello_psp_strip.elf
          
          rm -f PARAM.SFO EBOOT.PBP
          mksfoex -d MEMSIZE=1 -s CATEGORY=UG 'Hello PSP Game' PARAM.SFO
          
          touch /tmp/empty
          pack-pbp EBOOT.PBP PARAM.SFO /tmp/empty /tmp/empty /tmp/empty /tmp/empty /tmp/empty hello_psp_strip.elf /tmp/empty
          
          echo '=== Final check ==='
          strings PARAM.SFO
          ls -la EBOOT.PBP
        "

    - name: Create ISO
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq genisoimage
        mkdir -p iso_root/PSP_GAME
        cp EBOOT.PBP iso_root/PSP_GAME/
        genisoimage -A "HELLO PSP" -V "HELLO_PSP" -r -J -o game.iso iso_root/

    - name: Upload EBOOT.PBP
      uses: actions/upload-artifact@v4
      with:
        name: psp-game-eboot
        path: EBOOT.PBP
        if-no-files-found: error

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: psp-game-iso
        path: game.iso
        if-no-files-found: warn

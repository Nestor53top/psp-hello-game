name: Build PSP Game

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: pspdev/pspdev:latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Verify PSPSDK
      run: |
        echo "PSPDEV=$PSPDEV"
        psp-config --pspsdk-path
        which psp-gcc

    - name: Build PSP game
      run: |
        make clean || true
        make

    - name: List build artifacts
      run: |
        ls -la EBOOT.PBP || echo "No EBOOT.PBP"
        ls -la *.prx || echo "No PRX"
        ls -la *.elf || echo "No ELF"
        find . -name "*.pbp" -o -name "*.elf" -o -name "*.prx" 2>/dev/null

    - name: Create ISO
      run: |
        mkdir -p iso_root/PSP_GAME
        cp EBOOT.PBP iso_root/PSP_GAME/
        
        # Create a basic PARAM.SFO using the SDK tool if available
        if command -v mksfo &> /dev/null; then
          mksfo "HELLO PSP GAME" iso_root/PSP_GAME/PARAM.SFO || true
        fi
        
        # Create ISO using mkisofs/genisoimage
        apt-get update -qq && apt-get install -y -qq genisoimage 2>/dev/null || true
        
        if command -v genisoimage &> /dev/null; then
          genisoimage -A "HELLO PSP" -V "HELLO_PSP" -r -J -o game.iso iso_root/
        elif command -v mkisofs &> /dev/null; then
          mkisofs -A "HELLO PSP" -V "HELLO_PSP" -r -J -o game.iso iso_root/
        else
          echo "No ISO creation tool found, skipping ISO generation"
        fi
        
        ls -la game.iso || echo "ISO not created"

    - name: Upload EBOOT.PBP
      uses: actions/upload-artifact@v4
      with:
        name: psp-game-eboot
        path: EBOOT.PBP
        if-no-files-found: error

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: psp-game-iso
        path: game.iso
        if-no-files-found: warn
